# =============================================================================
# application.properties - central configuration file for our Spring Boot app.
# Spring Boot automatically loads this file from src/main/resources at startup.
# =============================================================================

# ----- Server configuration -----
# The port our embedded Tomcat server listens on. 8080 is Spring Boot's own
# default, but we set it explicitly here so it's documented and easy to change.
server.port=8080

# ----- Application name -----
# Shows up in logs and is useful once you have multiple services to tell apart.
spring.application.name=todo-cicd

# =============================================================================
# H2 Database connection
# WHY H2 in-memory: zero setup - no external database server to install, start,
# or configure. The schema/data live only in RAM for the lifetime of the JVM
# process, which is ideal for learning, local development, and CI pipelines
# where every test run should start from a clean, predictable, empty database.
# =============================================================================

# JDBC URL for an in-memory H2 database named "tododb".
# DB_CLOSE_DELAY=-1  -> keep the in-memory database alive for the whole app
#                       lifetime instead of wiping it the moment the first
#                       connection closes (important because Spring Boot/HikariCP
#                       opens and closes pooled connections constantly).
# DB_CLOSE_ON_EXIT=FALSE -> don't drop the DB when a connection thread exits.
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ----- H2 web console -----
# Enables a browser-based UI at http://localhost:8080/h2-console where you can
# run SQL queries against the live in-memory database. EXTREMELY useful while
# learning, to see exactly what JPA/Hibernate is actually storing.
# WHY it's safe here: H2 console is only ever exposed on your own machine during
# local development - never enable this in a real production environment.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================================================
# JPA / Hibernate configuration
# =============================================================================

# create-drop: Hibernate creates all tables from our @Entity classes when the
# app starts, and drops them again when the app shuts down.
# WHY: combined with an in-memory H2 database, this guarantees every run (and
# every test run) starts from a guaranteed-fresh, empty schema that always
# matches our current entity definitions - no manual migration scripts needed
# while learning. (In real production apps you'd use `validate` and a proper
# migration tool like Flyway/Liquibase instead, since `create-drop` would erase
# your data on every restart.)
spring.jpa.hibernate.ddl-auto=create-drop

# Pretty-print and log every SQL statement Hibernate executes, straight to the
# console. WHY: as a beginner, seeing the actual generated SQL behind each
# repository call is one of the best ways to build a correct mental model of
# what Spring Data JPA is doing under the hood.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate which SQL "dialect" (flavor of SQL) to generate. Spring Boot
# can usually auto-detect this from the JDBC driver, but setting it explicitly
# for H2 avoids ambiguity and removes a startup warning.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate normally defers opening a database connection until it's first
# needed (lazy). Disabling this means Spring tests/logs surface real DB errors
# immediately at startup, rather than later in some unrelated request - easier
# to debug while you're learning.
spring.jpa.open-in-view=false
